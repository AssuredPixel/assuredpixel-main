name: Daily Blog Update

on:
  schedule:
    - cron: '0 0 * * *' # Midnight UTC every day
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  ping_vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secret is set
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "❌ VERCEL_DEPLOY_HOOK_URL secret is not set!"
            exit 1
          fi
          echo "✅ Secret is present"

      - name: Trigger Vercel Build Hook
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS/d')
          echo "Response body: $BODY"
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "❌ Vercel deploy hook failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Vercel build triggered successfully"
